<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheFirstWord — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1923;
      --bg2: #162030;
      --bg3: #1e2d40;
      --border: rgba(255,255,255,0.07);
      --text: #f0f4f8;
      --text-muted: #7a8fa6;
      --teal: #2A7F7F;
      --teal-light: rgba(42,127,127,0.15);
      --orange: #E8650A;
      --orange-light: rgba(232,101,10,0.15);
      --green: #2ecc71;
      --green-light: rgba(46,204,113,0.12);
      --red: #e74c3c;
      --yellow: #f1c40f;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

    /* LOGIN */
    #loginView {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .login-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 48px; width: 100%; max-width: 400px; text-align: center;
    }
    .login-logo { font-size: 32px; margin-bottom: 8px; }
    .login-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }
    .login-input {
      width: 100%; padding: 14px 16px; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 15px; font-family: inherit;
      outline: none; margin-bottom: 12px; letter-spacing: 2px;
    }
    .login-input:focus { border-color: var(--teal); }
    .login-btn {
      width: 100%; background: var(--teal); color: white; border: none; border-radius: 10px;
      padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: background 0.2s;
    }
    .login-btn:hover { background: #1d5f5f; }
    .login-error { font-size: 13px; color: var(--red); margin-top: 10px; display: none; }

    /* DASHBOARD */
    #dashView { display: none; }

    /* TOP NAV */
    .topnav {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 60px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .nav-brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    .nav-brand-name { font-size: 15px; font-weight: 700; }
    .nav-brand-sub { font-size: 11px; color: var(--text-muted); }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .last-updated { font-size: 12px; color: var(--text-muted); }
    .btn-refresh {
      background: var(--bg3); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .btn-refresh:hover { border-color: var(--teal); color: var(--teal); }
    .btn-logout {
      background: transparent; border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 8px; padding: 8px 14px; font-size: 12px; cursor: pointer;
      font-family: inherit;
    }

    /* MAIN */
    .main { padding: 32px; max-width: 1400px; margin: 0 auto; }

    /* STAT CARDS */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    @media (max-width: 900px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .stat-grid { grid-template-columns: 1fr; } }

    .stat-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 24px;
    }
    .stat-label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
    .stat-value { font-size: 40px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
    .stat-sub { font-size: 12px; color: var(--text-muted); }
    .stat-card.teal .stat-value { color: var(--teal); }
    .stat-card.orange .stat-value { color: var(--orange); }
    .stat-card.green .stat-value { color: var(--green); }
    .stat-card.yellow .stat-value { color: var(--yellow); }

    /* SECTION GRID */
    .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media (max-width: 800px) { .section-grid { grid-template-columns: 1fr; } }
    .section-grid.wide { grid-template-columns: 2fr 1fr; }
    @media (max-width: 1000px) { .section-grid.wide { grid-template-columns: 1fr; } }

    .card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 24px;
    }
    .card-title {
      font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
    }
    .card-title-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); }

    /* CHART */
    .chart-wrap { height: 120px; display: flex; align-items: flex-end; gap: 4px; }
    .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .chart-bar {
      width: 100%; background: var(--teal); border-radius: 4px 4px 0 0;
      min-height: 2px; transition: height 0.4s ease; position: relative; cursor: pointer;
    }
    .chart-bar:hover { background: #3ab0b0; }
    .chart-bar .tooltip {
      position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
      background: #1a2b3c; color: white; font-size: 11px; padding: 4px 8px;
      border-radius: 4px; white-space: nowrap; pointer-events: none; opacity: 0;
      margin-bottom: 4px; transition: opacity 0.15s;
    }
    .chart-bar:hover .tooltip { opacity: 1; }
    .chart-label { font-size: 9px; color: var(--text-muted); writing-mode: vertical-rl; transform: rotate(180deg); }

    /* DONUT / BREAKDOWN */
    .breakdown-list { display: flex; flex-direction: column; gap: 12px; }
    .breakdown-item { display: flex; align-items: center; gap: 12px; }
    .breakdown-label { font-size: 13px; color: var(--text); flex: 1; }
    .breakdown-bar-track { flex: 2; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .breakdown-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .breakdown-count { font-size: 13px; font-weight: 600; color: var(--text); width: 28px; text-align: right; }
    .breakdown-pct { font-size: 11px; color: var(--text-muted); width: 36px; text-align: right; }

    /* SUBSCRIBER TABLE */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left; padding: 10px 12px; font-size: 10px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted);
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    td { padding: 12px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .badge-starter  { background: rgba(122,143,166,0.15); color: #7a8fa6; }
    .badge-essential{ background: var(--teal-light); color: #4ab8b8; }
    .badge-complete { background: var(--orange-light); color: #e8850a; }
    .badge-monthly  { background: var(--green-light); color: var(--green); }
    .badge-en { background: rgba(42,127,127,0.1); color: var(--teal); }
    .badge-fr { background: rgba(232,101,10,0.1); color: var(--orange); }
    .badge-active { background: var(--green-light); color: var(--green); }
    .badge-inactive { background: rgba(122,143,166,0.1); color: var(--text-muted); }

    .email-cell { font-size: 12px; color: var(--text-muted); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .name-cell { font-weight: 500; }
    .date-cell { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

    /* TESTIMONIALS */
    .testimonial-item {
      padding: 14px 0; border-bottom: 1px solid var(--border);
    }
    .testimonial-item:last-child { border-bottom: none; }
    .testimonial-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .testimonial-name { font-size: 13px; font-weight: 600; }
    .testimonial-stars { color: var(--yellow); font-size: 12px; }
    .testimonial-msg { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .badge-approved { background: var(--green-light); color: var(--green); }
    .badge-pending { background: rgba(241,196,15,0.15); color: var(--yellow); }

    /* EMPTY / LOADING */
    .empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
    .loading-spinner-sm {
      width: 32px; height: 32px; border: 2px solid var(--border);
      border-top-color: var(--teal); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* SECTION HEADER */
    .section-label {
      font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 16px; margin-top: 8px;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView">
  <div class="login-card">
    <div class="login-logo">🔐</div>
    <h1 class="login-title">TheFirstWord Admin</h1>
    <p class="login-sub">Enter your admin password to continue</p>
    <input type="password" class="login-input" id="passwordInput" placeholder="••••••••••••" onkeydown="if(event.key==='Enter')login()" />
    <button class="login-btn" onclick="login()">Sign In</button>
    <p class="login-error" id="loginError">Incorrect password. Try again.</p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashView">
  <nav class="topnav">
    <div class="nav-brand">
      <div class="nav-brand-dot"></div>
      <div>
        <div class="nav-brand-name">TheFirstWord Admin</div>
        <div class="nav-brand-sub">Live dashboard</div>
      </div>
    </div>
    <div class="nav-right">
      <span class="last-updated" id="lastUpdated"></span>
      <button class="btn-refresh" onclick="loadData()">↻ Refresh</button>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <div class="main" id="mainContent">
    <div style="text-align:center;padding:80px 0;">
      <div class="loading-spinner-sm"></div>
      <p style="color:var(--text-muted);font-size:14px;">Loading your dashboard...</p>
    </div>
  </div>
</div>

<script>
  let adminSecret = '';

  // ─── LOGIN ──────────────────────────────────────────────────────────────────
  function login() {
    const pwd = document.getElementById('passwordInput').value.trim();
    if (!pwd) return;
    adminSecret = pwd;
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('dashView').style.display = 'block';
    loadData();
  }

  function logout() {
    adminSecret = '';
    document.getElementById('dashView').style.display = 'none';
    document.getElementById('loginView').style.display = 'flex';
    document.getElementById('passwordInput').value = '';
  }

  // ─── LOAD DATA ──────────────────────────────────────────────────────────────
  async function loadData() {
    try {
      const res = await fetch(`/api/admin/stats?secret=${encodeURIComponent(adminSecret)}`);
      if (res.status === 401) {
        document.getElementById('loginError').style.display = 'block';
        logout();
        return;
      }
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      renderDashboard(data);
      document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    } catch(e) {
      document.getElementById('mainContent').innerHTML = `
        <div class="empty">
          <p style="color:var(--red);margin-bottom:8px;">⚠️ Failed to load data</p>
          <p style="font-size:12px;">${e.message}</p>
          <button class="btn-refresh" style="margin-top:16px;" onclick="loadData()">Try again</button>
        </div>`;
    }
  }

  // ─── RENDER ─────────────────────────────────────────────────────────────────
  function renderDashboard(d) {
    const total = d.total || 0;
    const planColors = { starter: '#7a8fa6', essential: '#2A7F7F', complete: '#E8650A', monthly: '#2ecc71' };
    const substanceLabels = { alcohol: 'Alcohol', opioids: 'Opioids', cocaine: 'Cocaine', benzos: 'Benzos', cannabis: 'Cannabis', meth: 'Meth', multiple: 'Multiple', unknown: 'Unknown' };
    const relationshipLabels = { son: 'Son', daughter: 'Daughter', spouse: 'Spouse/Partner', sibling: 'Sibling', parent: 'Parent', friend: 'Friend' };

    function pct(n, t) { return t ? Math.round((n/t)*100) : 0; }

    function breakdownHtml(counts, labels, colorFn) {
      const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
      const max = sorted[0]?.[1] || 1;
      return sorted.map(([key, count]) => `
        <div class="breakdown-item">
          <span class="breakdown-label">${labels[key] || key}</span>
          <div class="breakdown-bar-track">
            <div class="breakdown-bar-fill" style="width:${Math.round((count/max)*100)}%;background:${colorFn(key)};"></div>
          </div>
          <span class="breakdown-count">${count}</span>
          <span class="breakdown-pct">${pct(count,total)}%</span>
        </div>`).join('');
    }

    // Daily chart
    const days = Object.entries(d.dailySignups || {});
    const maxDay = Math.max(...days.map(d=>d[1]), 1);
    const chartHtml = days.map(([date, count]) => {
      const h = Math.max(Math.round((count/maxDay)*100), count > 0 ? 4 : 2);
      const label = new Date(date + 'T12:00:00').toLocaleDateString('en-CA', { month:'short', day:'numeric' });
      return `<div class="chart-bar-wrap">
        <div class="chart-bar" style="height:${h}px;">
          <div class="tooltip">${label}: ${count} kit${count !== 1 ? 's' : ''}</div>
        </div>
        <span class="chart-label">${label.split(' ')[1]}</span>
      </div>`;
    }).join('');

    // Recent subscribers table
    const recentRows = (d.recent || []).map(sub => {
      const date = sub.signed_up_at ? new Date(sub.signed_up_at).toLocaleDateString('en-CA', { month:'short', day:'numeric', year:'2-digit' }) : '—';
      const weeksSent = [sub.week1_sent, sub.week2_sent, sub.week3_sent, sub.week4_sent].filter(Boolean).length;
      return `<tr>
        <td class="name-cell">${sub.name || '—'}</td>
        <td class="email-cell" title="${sub.email}">${sub.email}</td>
        <td><span class="badge badge-${sub.plan || 'complete'}">${sub.plan || 'complete'}</span></td>
        <td><span class="badge badge-${sub.lang || 'en'}">${(sub.lang || 'en').toUpperCase()}</span></td>
        <td>${substanceLabels[sub.substance] || sub.substance || '—'}</td>
        <td>${sub.plan === 'monthly' ? `${weeksSent}/4 sent` : '—'}</td>
        <td><span class="badge badge-${sub.active ? 'active' : 'inactive'}">${sub.active ? 'Active' : 'Inactive'}</span></td>
        <td class="date-cell">${date}</td>
      </tr>`;
    }).join('');

    // Testimonials
    const testimonialsHtml = (d.testimonials || []).length === 0
      ? '<div class="empty">No testimonials yet.</div>'
      : (d.testimonials || []).map(t => `
        <div class="testimonial-item">
          <div class="testimonial-header">
            <span class="testimonial-name">${t.name || 'Anonymous'}</span>
            <div style="display:flex;gap:8px;align-items:center;">
              <span class="testimonial-stars">${'★'.repeat(t.rating || 5)}</span>
              <span class="badge ${t.approved ? 'badge-approved' : 'badge-pending'}">${t.approved ? 'Live' : 'Pending'}</span>
            </div>
          </div>
          <p class="testimonial-msg">${t.message || ''}</p>
        </div>`).join('');

    document.getElementById('mainContent').innerHTML = `
      <!-- STAT CARDS -->
      <div class="stat-grid">
        <div class="stat-card teal">
          <div class="stat-label">Total Kits Generated</div>
          <div class="stat-value">${total}</div>
          <div class="stat-sub">${d.last30Days} in the last 30 days</div>
        </div>
        <div class="stat-card green">
          <div class="stat-label">Premium Subscribers</div>
          <div class="stat-value">${d.planCounts?.monthly || 0}</div>
          <div class="stat-sub">${d.weeklyActive} currently active</div>
        </div>
        <div class="stat-card orange">
          <div class="stat-label">Language Split</div>
          <div class="stat-value" style="font-size:28px;">${d.langCounts?.en || 0} EN / ${d.langCounts?.fr || 0} FR</div>
          <div class="stat-sub">${total ? pct(d.langCounts?.fr || 0, total) : 0}% French</div>
        </div>
        <div class="stat-card yellow">
          <div class="stat-label">Most Common Substance</div>
          <div class="stat-value" style="font-size:22px;line-height:1.2;margin-top:4px;">
            ${Object.entries(d.substanceCounts || {}).sort((a,b)=>b[1]-a[1])[0]
              ? substanceLabels[Object.entries(d.substanceCounts).sort((a,b)=>b[1]-a[1])[0][0]] || '—'
              : '—'}
          </div>
          <div class="stat-sub">of ${total} total kits</div>
        </div>
      </div>

      <!-- CHART + PLAN BREAKDOWN -->
      <div class="section-grid wide">
        <div class="card">
          <div class="card-title"><span class="card-title-dot"></span>Kits Generated — Last 14 Days</div>
          <div class="chart-wrap">${chartHtml}</div>
        </div>
        <div class="card">
          <div class="card-title"><span class="card-title-dot"></span>Plan Breakdown</div>
          <div class="breakdown-list">
            ${breakdownHtml(d.planCounts || {}, { starter:'Starter ($9)', essential:'Essential ($19)', complete:'Complete ($29)', monthly:'Premium ($19/mo)' }, k => planColors[k] || '#7a8fa6')}
          </div>
        </div>
      </div>

      <!-- SUBSTANCE + RELATIONSHIP -->
      <div class="section-grid">
        <div class="card">
          <div class="card-title"><span class="card-title-dot"></span>Substance Breakdown</div>
          <div class="breakdown-list">
            ${Object.keys(d.substanceCounts || {}).length
              ? breakdownHtml(d.substanceCounts, substanceLabels, () => '#2A7F7F')
              : '<div class="empty">No data yet</div>'
            }
          </div>
        </div>
        <div class="card">
          <div class="card-title"><span class="card-title-dot"></span>Relationship Breakdown</div>
          <div class="breakdown-list">
            ${Object.keys(d.relationshipCounts || {}).length
              ? breakdownHtml(d.relationshipCounts, relationshipLabels, () => '#E8650A')
              : '<div class="empty">No data yet</div>'
            }
          </div>
        </div>
      </div>

      <!-- SUBSCRIBERS TABLE -->
      <div class="card" style="margin-bottom:24px;">
        <div class="card-title"><span class="card-title-dot"></span>Recent Subscribers (Last 25)</div>
        ${(d.recent || []).length === 0
          ? '<div class="empty">No subscribers yet. Generate a kit and send it by email to see data here.</div>'
          : `<div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Plan</th>
                  <th>Lang</th>
                  <th>Substance</th>
                  <th>Weekly</th>
                  <th>Status</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody>${recentRows}</tbody>
            </table>
          </div>`
        }
      </div>

      <!-- TESTIMONIALS -->
      <div class="card" style="margin-bottom:40px;">
        <div class="card-title"><span class="card-title-dot"></span>Testimonials
          <span style="margin-left:auto;font-size:11px;color:var(--text-muted);font-weight:400;letter-spacing:0;">
            Approve in Supabase → set approved=true → shows live on homepage
          </span>
        </div>
        ${testimonialsHtml}
      </div>
    `;
  }

  function pct(n, t) { return t ? Math.round((n/t)*100) : 0; }
</script>
</body>
</html>
